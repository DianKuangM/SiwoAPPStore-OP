<style>
:root{
    --main:#97a4fd;
    --light:#b4bdfe;
    --dark:#798cf0;
    --text:#202124;
    --gray:#5f6368;
    --bg:#f8f9fa;
    --card:#ffffff;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Roboto,system-ui}
body{background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1200px;margin:0 auto;padding:0 16px}
header{background:var(--main);padding:14px 0;box-shadow:0 2px 6px #0000001a}
.head-row{display:flex;justify-content:space-between;align-items:center}
.logo{font-size:24px;color:#fff;font-weight:bold;text-decoration:none}
.nav a{color:#fff;margin-left:20px;text-decoration:none;opacity:0.92}
.nav a:hover{opacity:1}
.card{background:var(--card);border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 1px 3px #00000012}
.btn{background:var(--main);color:white;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;text-decoration:inline-block}
.btn:hover{background:var(--dark)}
.btn-outline{border:1px solid var(--main);color:var(--main);background:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;margin:20px 0}
.app-item{display:flex;flex-direction:column}
.app-item img{width:64px;height:64px;border-radius:10px;object-fit:cover;margin-bottom:8px}
input,textarea{width:100%;padding:11px;border:1px solid #ddd;border-radius:6px;margin:8px 0}
footer{text-align:center;padding:30px;color:var(--gray);margin-top:40px}
</style>
